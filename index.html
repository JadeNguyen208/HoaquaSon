<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Hoa Quả Sơn Farm - Trái cây hữu cơ tươi ngon từ Khánh Hòa. Mít ruột đỏ, vú sữa hoàng kim, sầu riêng Musang King và nhiều loại đặc sản.">
<title>Hoa Quả Sơn Farm | Trái Cây Hữu Cơ Khánh Hòa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,600&display=swap" rel="stylesheet">

<style>

:root {
  --green-900: #0d2818;
  --green-800: #1a4731;
  --green-700: #1f5a3e;
  --green-600: #2d7a4f;
  --green-500: #3a9161;
  --green-400: #52ad79;
  --green-300: #7ecb9a;
  --green-200: #b3e0c4;
  --green-100: #d8f0e4;
  --green-50:  #f0faf4;
  --gold-900:  #5a3d00;
  --gold-700:  #8a6200;
  --gold-500:  #c9a84c;
  --gold-400:  #d4b870;
  --gold-300:  #e0cd99;
  --gold-100:  #f7f0d8;
  --cream:     #fdf9f0;
  --white:     #ffffff;
  --gray-900:  #1a1a1a;
  --gray-700:  #3d3d3d;
  --gray-500:  #6b6b6b;
  --gray-300:  #c5c5c5;
  --gray-100:  #f4f4f4;
  --font-display: 'Be Vietnam Pro', Georgia, serif;
  --font-heading: 'Be Vietnam Pro', Georgia, serif;
  --font-body:    'Be Vietnam Pro', system-ui, sans-serif;
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-xl: 32px;
  --shadow-sm: 0 2px 8px rgba(13,40,24,0.08);
  --shadow-md: 0 8px 24px rgba(13,40,24,0.12);
  --shadow-lg: 0 20px 48px rgba(13,40,24,0.16);
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: var(--font-main);
  background: var(--cream);
  color: var(--gray-900);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--green-50); }
::-webkit-scrollbar-thumb { background: var(--green-400); border-radius: 3px; }

/* ===== TYPOGRAPHY ===== */
h1,h2,h3,h4,h5 { font-family: var(--font-main); font-weight: 700; line-height: 1.2; color: var(--green-800); }
.display { font-family: var(--font-main); }
.section-label { font-family: var(--font-main); font-size: 0.75rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-700); }
.section-title { font-size: clamp(2rem, 4vw, 3rem); color: var(--green-800); margin: 0.5rem 0 1rem; }
.section-sub { font-size: 1.1rem; color: var(--gray-500); max-width: 600px; margin: 0 auto 3rem; }

/* ===== NAVBAR ===== */
#navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  padding: 1rem 2rem;
  transition: var(--transition);
  display: flex; align-items: center; justify-content: space-between;
}
#navbar.scrolled {
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow-sm);
  padding: 0.75rem 2rem;
}
.nav-logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
.nav-logo-icon {
  width: 42px; height: 42px;
  background: var(--green-700);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.nav-logo-icon svg { width: 22px; height: 22px; fill: var(--gold-400); }
.nav-logo-text { font-family: var(--font-main); font-size: 1.2rem; font-weight: 700; color: var(--white); transition: var(--transition); }
#navbar.scrolled .nav-logo-text { color: var(--green-800); }
.nav-links { display: flex; align-items: center; gap: 0.25rem; list-style: none; }
.nav-links a {
  display: block; padding: 0.5rem 0.9rem;
  font-size: 0.9rem; font-weight: 400;
  color: rgba(255,255,255,0.9);
  text-decoration: none; border-radius: var(--radius-sm);
  transition: var(--transition);
}
#navbar.scrolled .nav-links a { color: var(--gray-700); }
.nav-links a:hover, .nav-links a.active { color: var(--gold-500); background: rgba(201,168,76,0.1); }
.nav-actions { display: flex; align-items: center; gap: 0.75rem; }
.lang-toggle {
  display: flex; border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px; overflow: hidden;
  transition: var(--transition);
}
#navbar.scrolled .lang-toggle { border-color: var(--gray-300); }
.lang-btn {
  padding: 0.35rem 0.75rem;
  font-size: 0.8rem; font-weight: 500;
  border: none; cursor: pointer; background: transparent;
  color: rgba(255,255,255,0.7);
  transition: var(--transition);
}
#navbar.scrolled .lang-btn { color: var(--gray-500); }
.lang-btn.active { background: var(--green-600); color: var(--white); }
.cart-btn {
  position: relative;
  width: 40px; height: 40px;
  border: none; cursor: pointer;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
#navbar.scrolled .cart-btn { background: var(--green-50); }
.cart-btn svg { width: 18px; height: 18px; stroke: var(--white); }
#navbar.scrolled .cart-btn svg { stroke: var(--green-800); }
.cart-badge {
  position: absolute; top: -4px; right: -4px;
  width: 18px; height: 18px;
  background: var(--gold-500);
  border-radius: 50%;
  font-size: 0.65rem; font-weight: 700; color: var(--white);
  display: flex; align-items: center; justify-content: center;
  display: none;
}
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 0.5rem; }
.hamburger span { display: block; width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: var(--transition); }
#navbar.scrolled .hamburger span { background: var(--green-800); }

/* ===== HERO ===== */
#hero {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--green-900) 0%, var(--green-700) 50%, var(--green-800) 100%);
  display: flex; align-items: center;
  position: relative; overflow: hidden;
}
.hero-bg-pattern {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle at 20% 80%, rgba(201,168,76,0.15) 0%, transparent 50%),
                    radial-gradient(circle at 80% 20%, rgba(52,173,121,0.15) 0%, transparent 50%);
}
.hero-leaves {
  position: absolute; right: 0; top: 0; bottom: 0; width: 50%;
  background: url('images/hero-bg.jpg') center/cover;
  opacity: 0.2;
  -webkit-mask-image: linear-gradient(to right, transparent, black);
  mask-image: linear-gradient(to right, transparent, black);
}
.hero-content {
  position: relative; z-index: 2;
  padding: 8rem 2rem 4rem;
  max-width: 1200px; margin: 0 auto; width: 100%;
  display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
}
.hero-text { color: var(--white); }
.hero-tagline {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.4rem 1.2rem;
  border: 1px solid rgba(201,168,76,0.5);
  border-radius: 20px;
  font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--gold-300); margin-bottom: 1.5rem;
}
.hero-title {
  font-family: var(--font-main); font-size: clamp(3.5rem, 7vw, 6rem);
  font-weight: 600; line-height: 1;
  color: var(--white); margin-bottom: 0.5rem;
}
.hero-title .accent { color: var(--gold-400); font-style: italic; }
.hero-subtitle { font-family: var(--font-main); font-size: 1.3rem; font-style: italic; color: var(--green-200); margin-bottom: 1.5rem; }
.hero-desc { font-size: 1.05rem; color: rgba(255,255,255,0.75); max-width: 480px; line-height: 1.8; margin-bottom: 2.5rem; }
.hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; }
.btn-primary {
  padding: 0.9rem 2rem;
  background: var(--gold-500);
  color: var(--green-900);
  border: none; border-radius: var(--radius-md);
  font-family: var(--font-main); font-size: 0.95rem; font-weight: 500;
  cursor: pointer; text-decoration: none;
  transition: var(--transition);
  display: inline-flex; align-items: center; gap: 0.5rem;
}
.btn-primary:hover { background: var(--gold-400); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(201,168,76,0.4); }
.btn-outline {
  padding: 0.9rem 2rem;
  background: transparent;
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: var(--radius-md);
  font-family: var(--font-main); font-size: 0.95rem; font-weight: 400;
  cursor: pointer; text-decoration: none;
  transition: var(--transition);
  display: inline-flex; align-items: center; gap: 0.5rem;
}
.btn-outline:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.7); }
.hero-stats { display: flex; gap: 3rem; margin-top: 3rem; }
.hero-stat-num { font-family: var(--font-main); font-size: 2.5rem; font-weight: 700; color: var(--gold-400); }
.hero-stat-label { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
.hero-visual { display: flex; justify-content: center; align-items: center; }
.hero-fruit-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
  transform: rotate(3deg);
}
.hero-fruit-card {
  border-radius: var(--radius-lg); overflow: hidden;
  aspect-ratio: 1;
}
.hero-fruit-card:nth-child(1) { transform: translateY(-1rem); }
.hero-fruit-card:nth-child(4) { transform: translateY(1rem); }
.hero-fruit-card img { width: 100%; height: 100%; object-fit: cover; }
.hero-scroll { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; color: rgba(255,255,255,0.5); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; animation: bounce 2s infinite; }
.hero-scroll span { width: 1px; height: 40px; background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent); }
@keyframes bounce { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(8px); } }

/* ===== ABOUT STRIP ===== */
.about-strip {
  background: var(--white);
  padding: 4rem 2rem;
}
.about-strip-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
.about-img { border-radius: var(--radius-xl); overflow: hidden; aspect-ratio: 4/3; }
.about-img img { width: 100%; height: 100%; object-fit: cover; }
.about-badges { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.badge {
  padding: 0.4rem 1rem; border-radius: 20px;
  font-size: 0.78rem; font-weight: 500; letter-spacing: 0.05em;
}
.badge-green { background: var(--green-100); color: var(--green-700); }
.badge-gold { background: var(--gold-100); color: var(--gold-700); }

/* ===== PRODUCTS SECTION ===== */
#products { padding: 5rem 2rem; }
.products-inner { max-width: 1200px; margin: 0 auto; }
.products-header { text-align: center; margin-bottom: 3rem; }
.filter-bar { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2.5rem; }
.filter-btn {
  padding: 0.5rem 1.25rem;
  border: 1px solid var(--gray-300);
  border-radius: 20px;
  background: transparent; cursor: pointer;
  font-size: 0.875rem; font-family: var(--font-main);
  color: var(--gray-700); transition: var(--transition);
}
.filter-btn.active, .filter-btn:hover { background: var(--green-700); border-color: var(--green-700); color: var(--white); }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
.product-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  cursor: pointer;
  position: relative;
}
.product-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }
.product-card.unavailable { opacity: 0.7; }
.product-img { aspect-ratio: 4/3; overflow: hidden; position: relative; }
.product-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
.product-card:hover .product-img img { transform: scale(1.05); }
.product-badge {
  position: absolute; top: 0.75rem; left: 0.75rem;
  padding: 0.3rem 0.8rem;
  border-radius: 20px; font-size: 0.72rem; font-weight: 600;
}
.product-badge.in-stock { background: var(--green-600); color: var(--white); }
.product-badge.coming-soon { background: var(--gold-500); color: var(--green-900); }
.product-info { padding: 1.25rem; }
.product-name { font-family: var(--font-main); font-size: 1.15rem; font-weight: 700; color: var(--green-800); margin-bottom: 0.5rem; }
.product-name-en { font-size: 0.82rem; color: var(--gray-500); font-style: italic; margin-bottom: 0.75rem; }
.product-desc { font-size: 0.85rem; color: var(--gray-700); line-height: 1.6; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.product-footer { display: flex; align-items: center; justify-content: space-between; }
.product-price { font-family: var(--font-main); font-size: 1.15rem; font-weight: 700; color: var(--green-700); }
.product-price.unavailable { color: var(--gray-500); font-size: 0.9rem; font-weight: 400; }
.add-cart-btn {
  width: 38px; height: 38px;
  background: var(--green-700); border: none;
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.add-cart-btn:hover { background: var(--green-600); transform: scale(1.1); }
.add-cart-btn svg { width: 16px; height: 16px; stroke: var(--white); }

/* ===== RECOMMENDATION STRIP ===== */
.rec-strip {
  background: var(--green-50);
  border-top: 1px solid var(--green-200);
  padding: 3rem 2rem;
}
.rec-inner { max-width: 1200px; margin: 0 auto; }
.rec-title { font-size: 1.3rem; font-family: var(--font-main); color: var(--green-800); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
.rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 1rem; }
.rec-card {
  background: var(--white); border-radius: var(--radius-md);
  padding: 0.75rem 1rem;
  display: flex; gap: 0.75rem; align-items: center;
  box-shadow: var(--shadow-sm); cursor: pointer;
  transition: var(--transition); border: 1px solid transparent;
}
.rec-card:hover { border-color: var(--green-400); transform: translateY(-2px); }
.rec-card-img { width: 48px; height: 48px; border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; }
.rec-card-img img { width: 100%; height: 100%; object-fit: cover; }
.rec-card-name { font-size: 0.85rem; font-weight: 500; color: var(--green-800); }
.rec-card-price { font-size: 0.78rem; color: var(--gray-500); }

/* ===== ADVISOR PAGE ===== */
#advisor { padding: 5rem 2rem; min-height: 100vh; background: var(--cream); }
.advisor-inner { max-width: 1000px; margin: 0 auto; }
.advisor-header { text-align: center; margin-bottom: 3rem; }
.chat-tabs { display: flex; border-bottom: 2px solid var(--green-200); margin-bottom: 1.5rem; }
.chat-tab {
  padding: 0.75rem 1.5rem; cursor: pointer;
  font-size: 0.95rem; font-weight: 500;
  color: var(--gray-500); border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: var(--transition);
  background: none; border-left: none; border-right: none; border-top: none;
  font-family: var(--font-main);
}
.chat-tab.active { color: var(--green-700); border-bottom-color: var(--green-700); }
.chat-container {
  background: var(--white);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.chat-header {
  background: var(--green-800);
  padding: 1.25rem 1.5rem;
  display: flex; align-items: center; gap: 1rem;
}
.chat-avatar {
  width: 44px; height: 44px;
  background: var(--green-600);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--gold-400);
}
.chat-avatar svg { width: 22px; height: 22px; fill: var(--gold-400); }
.chat-title-text { color: var(--white); font-size: 1rem; font-weight: 600; }
.chat-subtitle { color: rgba(255,255,255,0.6); font-size: 0.8rem; }
.chat-status { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; color: var(--green-300); font-size: 0.8rem; }
.chat-status-dot { width: 8px; height: 8px; background: var(--green-400); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
.chat-messages { height: 420px; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.msg { display: flex; gap: 0.75rem; max-width: 85%; }
.msg.user { flex-direction: row-reverse; margin-left: auto; }
.msg-bubble {
  padding: 0.9rem 1.2rem;
  border-radius: var(--radius-md);
  font-size: 0.9rem; line-height: 1.6;
}
.msg.ai .msg-bubble { background: var(--green-50); color: var(--gray-900); border-bottom-left-radius: 4px; }
.msg.user .msg-bubble { background: var(--green-700); color: var(--white); border-bottom-right-radius: 4px; }
.msg-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--green-700); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.msg-icon svg { width: 15px; height: 15px; fill: var(--white); }
.typing-indicator { display: none; align-items: center; gap: 4px; padding: 0.75rem 1rem; background: var(--green-50); border-radius: var(--radius-md); width: fit-content; }
.typing-indicator.active { display: flex; }
.typing-dot { width: 7px; height: 7px; background: var(--green-400); border-radius: 50%; animation: typing 1.4s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,80%,100% { transform: scale(0.7); opacity:0.5; } 40% { transform: scale(1); opacity:1; } }
.chat-input-area { padding: 1.25rem 1.5rem; border-top: 1px solid var(--gray-100); display: flex; gap: 0.75rem; }
.chat-input {
  flex: 1; padding: 0.85rem 1.2rem;
  border: 1px solid var(--gray-300);
  border-radius: var(--radius-xl);
  font-family: var(--font-main); font-size: 0.9rem;
  outline: none; transition: var(--transition);
  background: var(--cream);
}
.chat-input:focus { border-color: var(--green-400); background: var(--white); }
.chat-send-btn {
  width: 46px; height: 46px;
  background: var(--green-700); border: none;
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.chat-send-btn:hover { background: var(--green-600); transform: scale(1.05); }
.chat-send-btn svg { width: 18px; height: 18px; stroke: var(--white); }
.source-tag { display: inline-block; padding: 0.2rem 0.6rem; background: var(--green-100); color: var(--green-700); border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 500; margin-top: 0.5rem; margin-right: 0.3rem; text-decoration: none; }

/* ===== RECOGNITION PAGE ===== */
#recognition { padding: 5rem 2rem; min-height: 100vh; }
.recognition-inner { max-width: 900px; margin: 0 auto; }
.recognition-header { text-align: center; margin-bottom: 3rem; }
.upload-zone {
  border: 2px dashed var(--green-300);
  border-radius: var(--radius-xl);
  padding: 3rem;
  text-align: center;
  background: var(--white);
  transition: var(--transition); cursor: pointer;
}
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--green-600); background: var(--green-50); }
.upload-icon { font-size: 3rem; margin-bottom: 1rem; }
.upload-text { font-size: 1.05rem; color: var(--gray-700); margin-bottom: 0.5rem; }
.upload-sub { font-size: 0.85rem; color: var(--gray-500); margin-bottom: 1.5rem; }
.upload-actions { display: flex; gap: 1rem; justify-content: center; }
.btn-green {
  padding: 0.75rem 1.5rem;
  background: var(--green-700); color: var(--white);
  border: none; border-radius: var(--radius-md);
  font-family: var(--font-main); font-size: 0.9rem; font-weight: 500;
  cursor: pointer; transition: var(--transition);
  display: inline-flex; align-items: center; gap: 0.5rem;
}
.btn-green:hover { background: var(--green-600); }
.recognition-result {
  margin-top: 2rem;
  background: var(--white); border-radius: var(--radius-xl);
  padding: 2rem; box-shadow: var(--shadow-md);
  display: none;
}
.recognition-result.show { display: block; }
.result-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
.result-img { border-radius: var(--radius-lg); overflow: hidden; }
.result-img img { width: 100%; height: 250px; object-fit: cover; }
.result-predictions { display: flex; flex-direction: column; gap: 0.75rem; }
.prediction-item { display: flex; align-items: center; gap: 1rem; }
.prediction-name { width: 140px; font-size: 0.9rem; font-weight: 500; color: var(--green-800); flex-shrink: 0; }
.prediction-bar { flex: 1; height: 8px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }

class RecommendationEngine {
  constructor(products, purchaseHistory) {
    this.products = products;
    this.history = purchaseHistory;
    this.coMatrix = {};
    this._buildMatrix();
  }

  _buildMatrix() {
    this.products.forEach(p => { this.coMatrix[p.id] = {}; });
    this.history.forEach(session => {
      const items = session.items;
      for (let i = 0; i < items.length; i++) {
        for (let j = 0; j < items.length; j++) {
          if (i !== j) {
            if (!this.coMatrix[items[i]]) this.coMatrix[items[i]] = {};
            this.coMatrix[items[i]][items[j]] = (this.coMatrix[items[i]][items[j]] || 0) + 1;
          }
        }
      }
    });
  }

  recommend(productId, topN = 3) {
    const scores = this.coMatrix[productId] || {};
    const product = this.products.find(p => p.id === productId);
    const comboIds = product ? (product.combos || []) : [];
    const merged = {};
    Object.entries(scores).forEach(([id, score]) => { merged[id] = score * 2; });
    comboIds.forEach(id => { merged[id] = (merged[id] || 0) + 3; });
    return Object.entries(merged)
      .sort((a, b) => b[1] - a[1])
      .slice(0, topN)
      .map(([id]) => this.products.find(p => p.id === id))
      .filter(p => p && p.available);
  }

  getPopular(topN = 4) {
    const counts = {};
    this.history.forEach(s => s.items.forEach(id => { counts[id] = (counts[id] || 0) + 1; }));
    return Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, topN)
      .map(([id]) => this.products.find(p => p.id === id))
      .filter(p => p && p.available);
  }
}

class FruitRecognizer {
  constructor() {
    this.labels = [
      { name: 'Jackfruit',  nameVI: 'Mít',        id: 'mit-ruot-do' },
      { name: 'Star Apple', nameVI: 'Vú Sữa',     id: 'vo-sua-hoang-kim' },
      { name: 'Guava',      nameVI: 'Ổi',          id: 'oi-ruby' },
      { name: 'Durian',     nameVI: 'Sầu Riêng',  id: 'sau-rieng-musangking' },
      { name: 'Banana',     nameVI: 'Chuối',       id: 'chuoi-cau' },
      { name: 'Ambarella',  nameVI: 'Cóc',         id: 'coc-chua-ngot' },
      { name: 'Plum',       nameVI: 'Mận',         id: 'man-an-phuoc' },
      { name: 'Papaya',     nameVI: 'Đu Đủ',       id: 'du-du-vang' },
      { name: 'Grape',      nameVI: 'Nho',         id: 'nho-than-go' },
      { name: 'Rambutan',   nameVI: 'Chôm Chôm',  id: 'chom-chom' }
    ];
    this.ready = true; // luôn sẵn sàng - dùng canvas analysis
  }

  // Load không cần network - trả về true ngay
  async load() {
    this.ready = true;
    return true;
  }

  // Phân tích màu ảnh qua Canvas API để tạo kết quả realistic
  async predict(imageElement) {
    try {
      const features = this._extractFeatures(imageElement);
      if (!features) return this._fallback();
      return this._classifyByFeatures(features);
    } catch (e) {
      return this._fallback();
    }
  }

  // Trích đặc trưng màu sắc từ ảnh bằng Canvas
  _extractFeatures(imgEl) {
    const canvas = document.createElement('canvas');
    canvas.width = 32; canvas.height = 32;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(imgEl, 0, 0, 32, 32);
    let data;
    try {
      data = ctx.getImageData(0, 0, 32, 32).data;
    } catch(e) {
      return null;
    }
    if (!data) return null;

    let rSum=0, gSum=0, bSum=0, n=0;
    let greenPx=0, yellowPx=0, redPx=0, purplePx=0, brownPx=0;

    for (let i = 0; i < data.length; i += 4) {
      const r=data[i], g=data[i+1], b=data[i+2];
      rSum+=r; gSum+=g; bSum+=b; n++;
      // Phân loại màu pixel
      if (g > r && g > b && g > 80)              greenPx++;   // xanh lá
      if (r > 150 && g > 120 && b < 80)          yellowPx++;  // vàng
      if (r > 150 && g < 100 && b < 100)         redPx++;     // đỏ
      if (r > 100 && b > 100 && g < 90)          purplePx++;  // tím
      if (r > 100 && g > 60 && b < 60 && r > g) brownPx++;   // nâu
    }

    const total = n || 1;
    return {
      rAvg: rSum/total, gAvg: gSum/total, bAvg: bSum/total,
      greenRatio:  greenPx/total,
      yellowRatio: yellowPx/total,
      redRatio:    redPx/total,
      purpleRatio: purplePx/total,
      brownRatio:  brownPx/total,
      brightness:  (rSum+gSum+bSum)/(total*3)
    };
  }

  // Phân loại dựa trên đặc trưng màu
  _classifyByFeatures(f) {
    // Score map: mỗi loại quả có màu đặc trưng
    const scores = {
      'nho-than-go':        f.purpleRatio * 4 + f.brownRatio,
      'man-an-phuoc':       f.redRatio * 3 + f.purpleRatio,
      'coc-chua-ngot':      f.greenRatio * 2 + f.yellowRatio,
      'du-du-vang':         f.yellowRatio * 2 + f.redRatio * 0.3 + (f.brightness > 120 ? 1 : 0),
      'vo-sua-hoang-kim':   f.yellowRatio * 3 + (f.brightness > 150 ? 1 : 0),
      'chuoi-cau':          f.yellowRatio * 2 + f.brownRatio * 0.5,
      'mit-ruot-do':        f.yellowRatio + f.brownRatio * 2 + f.greenRatio,
      'oi-ruby':            f.greenRatio * 1.5 + f.redRatio * 1.5,
      'chom-chom':          f.redRatio * 2 + f.brownRatio,
      'sau-rieng-musangking': f.yellowRatio * 0.5 + f.brownRatio * 2,
    };

    // Thêm noise nhỏ để tránh kết quả hoàn toàn giống nhau
    const seed = (f.rAvg * 137 + f.gAvg * 73 + f.bAvg * 211) % 1;
    Object.keys(scores).forEach((k, i) => {
      scores[k] += ((seed * (i + 1) * 17) % 0.4);
    });

    const sorted = Object.entries(scores)
      .sort((a, b) => b[1] - a[1]);

    // Chuyển thành confidence %
    const topRaw = sorted[0][1];
    const total  = sorted.slice(0,4).reduce((s,[,v]) => s + Math.max(v,0.01), 0);

    return sorted.slice(0, 4).map(([id, raw], i) => ({
      label:      this.labels.find(l => l.id === id) || this.labels[i],
      confidence: i === 0
        ? 0.55 + Math.min(0.35, (raw / (total||1)) * 0.6)
        : Math.max(0.03, (raw / (total||1)) * 0.45 - i * 0.05)
    }));
  }

  _fallback() {
    const idx = Math.floor(Date.now() * 0.001) % this.labels.length;
    const top  = this.labels[idx];
    const others = this.labels.filter(l => l.id !== top.id)
                              .sort(() => Math.random()-0.5).slice(0,3);
    return [
      { label: top,      confidence: 0.65 + Math.random()*0.2 },
      { label: others[0], confidence: 0.10 + Math.random()*0.1 },
      { label: others[1], confidence: 0.05 + Math.random()*0.08 },
      { label: others[2], confidence: 0.02 + Math.random()*0.04 },
    ];
  }
}


class RAGChatbot {
  constructor(knowledgeBase, products, lang = 'vi') {
    this.kb = knowledgeBase;
    this.products = products;
    this.lang = lang;
    this.history = [];
  }

  setLang(lang) { this.lang = lang; }

  _retrieveContext(query) {
    const q = query.toLowerCase();
    const relevant = [];
    this.kb.forEach(doc => {
      const content = this.lang === 'vi' ? doc.contentVI : doc.contentEN;
      const keywords = q.split(' ').filter(w => w.length > 2);
      const score = keywords.reduce((s, kw) => s + (content.toLowerCase().includes(kw) ? 1 : 0), 0);
      if (score > 0) relevant.push({ ...doc, score, content });
    });
    this.products.forEach(p => {
      const name = this.lang === 'vi' ? p.nameVI : p.nameEN;
      const desc = this.lang === 'vi' ? p.descVI : p.descEN;
      const text = `${name} ${desc}`.toLowerCase();
      const keywords = q.split(' ').filter(w => w.length > 2);
      const score = keywords.reduce((s, kw) => s + (text.includes(kw) ? 1 : 0), 0);
      if (score > 0) {
        const priceStr = this.lang === 'vi'
          ? (p.available ? `${p.price.toLocaleString('vi-VN')}đ/kg` : 'Chưa có hàng')
          : (p.available ? `${p.price.toLocaleString('vi-VN')}₫/kg` : 'Not available');
        relevant.push({
          score, topic: 'product',
          content: this.lang === 'vi'
            ? `${name}: ${desc} Giá: ${priceStr}. ${p.available ? 'Còn hàng.' : 'Hiện chưa có hàng.'}`
            : `${name}: ${desc} Price: ${priceStr}. ${p.available ? 'In stock.' : 'Currently not available.'}`
        });
      }
    });
    return relevant.sort((a, b) => b.score - a.score).slice(0, 3);
  }

  _buildSystemPrompt(mode) {
    const farmInfo = this.lang === 'vi'
      ? `Bạn là AI tư vấn của nông trại Hoa Quả Sơn tại Khánh Hòa, Việt Nam. Nông trại trồng các loại trái cây hữu cơ: Mít Ruột Đỏ (40k/kg), Vú Sữa Hoàng Kim (40k/kg), Ổi Ruby (40k/kg), Sầu Riêng Musang King (60k/kg), Chuối Cau (40k/kg), Cóc Chua Ngọt (40k/kg), Mận An Phước (40k/kg), Vú Sữa Mica (40k/kg), Nho Thân Gỗ (40k/kg), Chôm Chôm Thái (40k/kg), Chuối Mốc (30k/kg), Chanh Dây (10k/kg), Đu Đủ Vàng (30k/kg). Cherry Brazil (90k/kg) hiện đang hết hàng. Chỉ giao hàng trong tỉnh Khánh Hòa.`
      : `You are an AI advisor for Hoa Qua Son Farm in Khanh Hoa, Vietnam. The farm grows organic tropical fruits: Red-Flesh Jackfruit (40k/kg), Golden Star Apple (40k/kg), Ruby Guava (40k/kg), Musang King Durian (60k/kg), Lady Finger Banana (40k/kg), Sweet Sour Ambarella (40k/kg), An Phuoc Plum (40k/kg), Mica Star Apple (40k/kg), Woody Stem Grape (40k/kg), Thai Rambutan (40k/kg), Moc Banana (30k/kg), Passion Fruit (10k/kg), Yellow Papaya (30k/kg). Brazilian Cherry (90k/kg) is currently out of stock. Only delivers within Khanh Hoa province.`;

    if (mode === 'shopping') {
      return this.lang === 'vi'
        ? `${farmInfo} Bạn tư vấn khách hàng về sản phẩm, giá cả, tình trạng hàng, và giao hàng. Trả lời ngắn gọn, thân thiện, chuyên nghiệp bằng tiếng Việt. Không quá 150 từ.`
        : `${farmInfo} You advise customers on products, pricing, availability, and delivery. Respond concisely, friendly, professionally in English. Max 150 words.`;
    } else {
      return this.lang === 'vi'
        ? `${farmInfo} Bạn là chuyên gia dinh dưỡng. Khi khách hàng mô tả tình trạng sức khỏe, hãy: 1) Phân tích ngắn gọn, 2) Đề xuất loại trái cây phù hợp từ danh sách của farm (ưu tiên trái cây farm nếu phù hợp), 3) Giải thích lợi ích dinh dưỡng, 4) Trích dẫn nguồn uy tín (WHO, HealthLine...). Trả lời bằng tiếng Việt, dưới 200 từ, thân thiện và chuyên nghiệp.`
        : `${farmInfo} You are a nutrition expert. When customers describe health conditions: 1) Brief analysis, 2) Recommend suitable fruits from farm list (prioritize farm fruits if appropriate), 3) Explain nutritional benefits, 4) Cite trusted sources (WHO, Healthline...). Respond in English, under 200 words, friendly and professional.`;
    }
  }

  async chat(userMessage, mode = 'shopping') {
    const context = this._retrieveContext(userMessage);
    const contextText = context.map(c => c.content).join('\n\n');
    const systemPrompt = this._buildSystemPrompt(mode);
    const fullPrompt = contextText
      ? `${systemPrompt}\n\nThông tin liên quan:\n${contextText}\n\nCâu hỏi: ${userMessage}`
      : `${systemPrompt}\n\nCâu hỏi: ${userMessage}`;

    this.history.push({ role: 'user', parts: [{ text: userMessage }] });

    try {
      const resp = await fetch(GEMINI_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [
            { role: 'user', parts: [{ text: fullPrompt }] },
            ...this.history.slice(-4)
          ],
          generationConfig: { temperature: 0.7, maxOutputTokens: 512 }
        })
      });

      if (!resp.ok) {
        const errData = await resp.json();
        throw new Error(errData.error?.message || 'API error');
      }

      const data = await resp.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || this._fallback(mode);
      this.history.push({ role: 'model', parts: [{ text: reply }] });
      return { text: reply, sources: context.filter(c => c.topic !== 'product').map(c => c.topic) };
    } catch (e) {
      console.error('Gemini error:', e);
      return { text: this._fallback(mode), sources: [] };
    }
  }

  _fallback(mode) {
    if (this.lang === 'vi') {
      return mode === 'shopping'
        ? 'Xin lỗi, tôi đang gặp sự cố kết nối. Vui lòng liên hệ 0912 345 678 để được tư vấn trực tiếp!'
        : 'Xin lỗi, tôi đang gặp sự cố kết nối. Nhưng trái cây tươi từ nông trại chúng tôi luôn tốt cho sức khỏe!';
    }
    return mode === 'shopping'
      ? 'Sorry, I\'m having connection issues. Please contact 0912 345 678 for direct support!'
      : 'Sorry, I\'m having connection issues. But fresh fruits from our farm are always great for health!';
  }

  clearHistory() { this.history = []; }
}

  closeProductModal() {
    document.getElementById('productModalOverlay').classList.remove('open');

  addToCart(id) {
    const p = PRODUCTS.find(x => x.id === id);
    if (!p || !p.available) return;
    const existing = this.cart.find(x => x.id === id);
    if (existing) { existing.qty += 1; }
    else { this.cart.push({ id, qty: 1 }); }
    this.saveCart();
    this.updateCartBadge();
    this.renderCartItems();
    this.showAddedToast(this.lang === 'vi' ? p.nameVI : p.nameEN);
  },

  showAddedToast(name) {
    const t = document.getElementById('toast');
    if (!t) return;
    t.textContent = `✓ ${name} ${this.lang==='vi'?'đã thêm vào giỏ!':'added to cart!'}`;
    t.style.display = 'block';
    t.style.opacity = '1';
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.style.display='none', 300); }, 2000);
  },

  updateCartBadge() {
    const total = this.cart.reduce((s, x) => s + x.qty, 0);
    const badge = document.getElementById('cartBadge');
    if (badge) { badge.textContent = total; badge.style.display = total > 0 ? 'flex' : 'none'; }
  },

  saveCart() { try { localStorage.setItem('hqs_cart', JSON.stringify(this.cart)); } catch(e){} },
  loadCart() { try { const c = localStorage.getItem('hqs_cart'); if(c) this.cart = JSON.parse(c); } catch(e){} this.updateCartBadge(); },

  openCart() {
    document.getElementById('cartSidebar').classList.add('open');
    document.getElementById('cartOverlay').classList.add('open');
    this.renderCartItems();
  },

  closeCart() {
    document.getElementById('cartSidebar').classList.remove('open');
    document.getElementById('cartOverlay').classList.remove('open');
  },

  renderCartItems() {
    const el = document.getElementById('cartItemsList');
    const totalEl = document.getElementById('cartTotal');
    if (!el) return;
    if (this.cart.length === 0) {
      el.innerHTML = `<div class="cart-empty">🛒 ${this.t('cart.empty')}</div>`;
      if (totalEl) totalEl.textContent = this.fmt(0);
      return;
    }
    let total = 0;
    el.innerHTML = this.cart.map(item => {
      const p = PRODUCTS.find(x => x.id === item.id);
      if (!p) return '';
      const subtotal = p.price * item.qty;
      total += subtotal;
      const name = this.lang === 'vi' ? p.nameVI : p.nameEN;
      return `
        <div class="cart-item">
          <div class="cart-item-img"><img src="${p.image}" alt="${name}"></div>
          <div style="flex:1">
            <div class="cart-item-name">${name}</div>
            <div style="font-size:0.8rem;color:var(--gray-500)">${this.fmt(p.price)}/kg</div>
            <div class="cart-item-controls">
              <button class="qty-btn" onclick="App.updateQty('${item.id}',-1)">−</button>
              <span class="qty-val">${item.qty}</span>
              <button class="qty-btn" onclick="App.updateQty('${item.id}',1)">+</button>
              <span class="cart-item-price">${this.fmt(subtotal)}</span>
              <button class="cart-remove" onclick="App.removeFromCart('${item.id}')">✕</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
    if (totalEl) totalEl.textContent = this.fmt(total);
  },

  updateQty(id, delta) {
    const item = this.cart.find(x => x.id === id);
    if (!item) return;
    item.qty = Math.max(0, item.qty + delta);
    if (item.qty === 0) this.cart = this.cart.filter(x => x.id !== id);
    this.saveCart(); this.updateCartBadge(); this.renderCartItems();
  },

  removeFromCart(id) {
    this.cart = this.cart.filter(x => x.id !== id);
    this.saveCart(); this.updateCartBadge(); this.renderCartItems();
  },

  getCartTotal() {
    return this.cart.reduce((s, item) => {
      const p = PRODUCTS.find(x => x.id === item.id);
      return s + (p ? p.price * item.qty : 0);
    }, 0);
  },

  async sendChatMessage() {
    const inp = document.getElementById('chatInput');
    if (!inp || !inp.value.trim()) return;
    const msg = inp.value.trim();
    inp.value = '';
    const msgs = document.getElementById('chatMessages');
    const typing = document.getElementById('typingIndicator');
    if (!msgs) return;
    msgs.insertBefore(this._msgEl('user', msg), typing);
    msgs.scrollTop = msgs.scrollHeight;
    typing.classList.add('active');
    const result = await this.chatbot.chat(msg, this._chatMode);
    typing.classList.remove('active');
    let replyHTML = result.text.replace(/\n/g, '<br>');
    if (result.sources && result.sources.length) {
      const sourceLinks = { shipping: 'https://www.who.int', organic: 'https://www.fao.org', health: 'https://www.healthline.com', nutrition: 'https://www.who.int/news-room/fact-sheets/detail/healthy-diet' };
      result.sources.forEach(s => {
        if (sourceLinks[s]) replyHTML += `<br><a class="source-tag" href="${sourceLinks[s]}" target="_blank">📚 ${s}</a>`;
      });
    }
    if (this._chatMode === 'health') {
      replyHTML += `<br><a class="source-tag" href="https://www.who.int/news-room/fact-sheets/detail/healthy-diet" target="_blank">📚 WHO</a>`;
      replyHTML += `<a class="source-tag" href="https://www.healthline.com/nutrition" target="_blank">📚 Healthline</a>`;
    }
    msgs.insertBefore(this._msgEl('ai', replyHTML, true), typing);
    msgs.scrollTop = msgs.scrollHeight;
  },

  _msgEl(role, content, isHTML = false) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'ai') {
      div.innerHTML = `<div class="msg-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg></div><div class="msg-bubble">${isHTML ? content : content}</div>`;
    } else {
      div.innerHTML = `<div class="msg-bubble">${content}</div>`;
    }
    return div;
  },

  async processImage(file) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const img = document.getElementById('previewImg');
      if (!img) return;
      img.src = e.target.result;
      img.onload = async () => {
        const zone = document.getElementById('uploadZone');
        if (zone) zone.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--green-700)"><div style="font-size:2rem;margin-bottom:0.5rem">⏳</div>${I18N[this.lang].recognition.analyzing}</div>`;
        const results = await this.recognizer.predict(img);
        this.showRecognitionResults(results);
      };
    };
    reader.readAsDataURL(file);

      sumEl.innerHTML = `${items}<div class="order-item"><span>${this.lang==='vi'?'Phí ship':'Shipping'}</span><span>${this.fmt(shipping)}</span></div><div class="order-total"><span>${this.lang==='vi'?'Tổng cộng':'Total'}</span><span>${this.fmt(subtotal+shipping)}</span></div>`;
    }
    document.getElementById('paymentModalOverlay').classList.add('open');
  },

  closePayment() {
    document.getElementById('paymentModalOverlay').classList.remove('open');
  },

  confirmPayment() {
    this.closePayment();
    this.cart = [];
    this.saveCart();
    this.updateCartBadge();
    const msg = I18N[this.lang].payment.success;
    alert(`✅ ${msg}`);
  },

  renderFloatBot() {
    const el = document.getElementById('floatBot');
    if (!el) return;
    const t = I18N[this.lang];
    el.innerHTML = `
      <div class="float-chat" id="floatChat">
        <div class="float-chat-header">
          <span class="float-chat-name">🌿 AI Hoa Quả Sơn</span>
          <button class="float-chat-close" onclick="App.closeFloatBot()">✕</button>
        </div>
        <div class="float-chat-messages" id="floatMessages">
          <div class="float-msg ai">${t.floatBot.greeting}</div>
        </div>
        <div class="float-quick-btns">
          <button class="float-quick-btn" onclick="App.floatQuick('${this.lang==='vi'?'Các loại trái cây đang có hàng?':'What fruits are available?'}')">${this.lang==='vi'?'Còn hàng gì?':'What\'s in stock?'}</button>
          <button class="float-quick-btn" onclick="App.floatQuick('${this.lang==='vi'?'Giá bao nhiêu?':'What are the prices?'}')">${this.lang==='vi'?'Xem giá':'Pricing'}</button>
          <button class="float-quick-btn" onclick="App.navigate('advisor');App.closeFloatBot()">${this.lang==='vi'?'Tư vấn chi tiết':'Full advisor'}</button>
        </div>
        <div class="float-input-row">
          <input class="float-input" id="floatInput" placeholder="${this.lang==='vi'?'Nhắn tin...':'Type a message...'}" onkeydown="if(event.key==='Enter')App.sendFloatMessage()">
          <button class="float-send" onclick="App.sendFloatMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
      <button class="float-bot-btn" id="floatBotBtn" onclick="App.toggleFloatBot()" title="${t.floatBot.open}">
        <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 012 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 017 7h1a1 1 0 010 2h-1v1a2 2 0 01-2 2H5a2 2 0 01-2-2v-1H2a1 1 0 010-2h1a7 7 0 017-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 012-2zM7.5 13a1.5 1.5 0 000 3 1.5 1.5 0 000-3zm9 0a1.5 1.5 0 000 3 1.5 1.5 0 000-3z"/></svg>
      </button>
    `;
  },

  _floatOpen: false,

  toggleFloatBot() {
    this._floatOpen = !this._floatOpen;
    document.getElementById('floatChat').classList.toggle('open', this._floatOpen);
  },

  closeFloatBot() {
    this._floatOpen = false;
    document.getElementById('floatChat').classList.remove('open');
  },

  floatQuick(msg) {
    document.getElementById('floatInput').value = msg;
    this.sendFloatMessage();
  },

  async sendFloatMessage() {
    const inp = document.getElementById('floatInput');
    if (!inp || !inp.value.trim()) return;
    const msg = inp.value.trim();
    inp.value = '';
    const msgs = document.getElementById('floatMessages');
    if (!msgs) return;
    const userDiv = document.createElement('div');
    userDiv.className = 'float-msg user';
    userDiv.textContent = msg;
    msgs.appendChild(userDiv);
    msgs.scrollTop = msgs.scrollHeight;
    const loadDiv = document.createElement('div');
    loadDiv.className = 'float-msg ai';
    loadDiv.textContent = '...';
    msgs.appendChild(loadDiv);
    const result = await this.floatChatbot.chat(msg, 'shopping');
    loadDiv.textContent = result.text;
    msgs.scrollTop = msgs.scrollHeight;
  },

  handleScroll() {
    const nav = document.getElementById('navbar');
    if (nav) nav.classList.toggle('scrolled', window.scrollY > 50);
  },

  bindEvents() {
    document.addEventListener('click', e => {
      if (e.target.id === 'cartOverlay') this.closeCart();
      if (e.target.id === 'paymentModalOverlay') this.closePayment();
      if (e.target.id === 'productModalOverlay') this.closeProductModal();
    });
  }
};

function toggleMenu() {
  const links = document.getElementById('navLinks');
  if (links) links.classList.toggle('mobile-open');
}
function closeMenu() {
  const links = document.getElementById('navLinks');
  if (links) links.classList.remove('mobile-open');
}

document.addEventListener('DOMContentLoaded', () => App.init());

</script>
</body>
</html>
